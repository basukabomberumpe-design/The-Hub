<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <input type="password" placeholder="Enter password here (one try)" oninput="password(this.value)"></input>
    <script>const smthng = localStorage.getItem("iscool?"); if (smthng === "yes") {window.location.href = "../"};</script>
    <script>
        function password(value) {
        fetch("../api/gamer.js")
        .then(res => res.json())
        .then(data => {
        if (value === data.value) {window.location.href = "./devdash.html"} else {localStorage.setitem("iscool?", "yes")};
        })};
    </script>
</body>
</html>
