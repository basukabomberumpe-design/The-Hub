<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <input type="password" placeholder="Enter password here (one try)" oninput="password(this.value)"></input>
    <script>const smthng = localStorage.getItem("iscool?"); if (smthng === "yes") {window.location.href = "../"};</script>
    <script>
        function password(value) {
  fetch("/api/gamer")
    .then(res => {
      if (!res.ok) throw new Error("Network response was not ok");
      return res.json();
    })
    .then(data => {
      if (value === data.value) {
        window.location.href = "./devdash.html";
      } else {
        localStorage.setItem("iscool?", "yes");
      }
      return data;
    })
    .catch(err => {
      console.error("Fetch error:", err);
    });
}


    </script>
</body>
</html>
