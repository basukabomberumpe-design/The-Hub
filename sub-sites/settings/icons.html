    <style>
        .things {

            margin-top: 5vh;

            flex-direction: column;

        }

    <div class="things">
        <h2 style="font-size: 4rem;">Click to copy the icon links</h2>
        <br>
        <img src="https://www.youtube.com/s/desktop/5af4fee3/img/favicon_144x144.png" alt="Youtube logo" height="100" width="100" onclick="clipboard('https://www.youtube.com/s/desktop/5af4fee3/img/favicon_144x144.png')">
        <img src="https://github.githubassets.com/favicons/favicon-dark.png" height="100" width="100" onclick="clipboard('https://github.githubassets.com/favicons/favicon-dark.png')" alt="github logo">
    </div>
    <script>function clipboard(value) {navigator.clipboard.writeText(value);};</script>
