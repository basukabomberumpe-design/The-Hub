<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TMDB Demo</title>
</head>
<body>
  <input id="q" placeholder="Search movies" />
  <button id="btn">Search</button>
  <ul id="out"></ul>

  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      const q = document.getElementById('q').value || 'matrix';
      const res = await fetch(`/api/movies?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      const list = document.getElementById('out');
      list.innerHTML = '';
      (data.results || []).forEach(m => {
        const li = document.createElement('li');
        li.textContent = m.title;
        list.appendChild(li);
      });
    });
  </script>
</body>
</html>
