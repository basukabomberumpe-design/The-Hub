<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Google</title>
    <link rel="stylesheet" href="../style.css" />
    <script src="../js/customizer.js" defer></script>
    <link rel="icon" type="image/png" href="https://www.gstatic.com/images/branding/searchlogo/ico/favicon.ico"/>
    <script src="https://kit.fontawesome.com/19b444568b.js" crossorigin="anonymous"></script>
    <script src="../js/panic.js" defer></script>
</head>
<body>
    <div id="sub">
        <a href="../index.html" style="margin-left: 10px;"> <i class="fa-regular fa-face-smile"></i> The Hub</a>
        <a href="../sub-sites/games.html"><span><i class="fa-solid fa-gamepad" style="font-size: 30px;"></i> Games</span></a>
        <a href="../sub-sites/links.html"><i class="fa-solid fa-link"></i> Links</a>
        <a href="../sub-sites/media.html"><i class="fa-solid fa-tv"></i> Media</a>
        <a href="./sub-sites/settings.html"> <i class="fa-solid fa-gear"></i> Settings</a>
    </div>
    <div class="thingys">
        <div class="thingy">
            <h2 style="margin-top: 20px;">Tab Customizer</h2>
            <form onsubmit="return false;" style="display: flex; flex-direction: column;">
                <input type="text" placeholder="Title" onkeyup="setTitle(this.value)" class="form">
                <input type="text" placeholder="Icon" onchange="setfavicon(this.value.trim())" class="form">
                <a href="./settings/icons.html" style="margin-top: 30px;">List of icons</a>
            </form>
        </div>
        <div class="thingy">
            <h2 style="margin-top: 20px;">Media Chooser</h2>
            <form onsubmit="return false;" style="display: flex; flex-direction: column;">
                <button onclick="setmedia('null')">Normal Movies</button>
                <button onclick="setmedia('yes')">My Collection</button>
            </form>
        </div>
        <div class="thingy">
            <h2 style="margin-top: 20px;">Panic System</h2>
            <form style="display: flex; flex-direction: column;">
                <input type="text" placeholder="button" onkeyup="setpanicbutton(this.value)" class="form">
                <input type="text" placeholder="link (remember https://)" onkeyup="setpaniclink(this.value)" class="form">
            </form>
        </div>
        <div class="thingy">
            <h2 style="margin-top: 20px;">Help</h2>
            <form style="display: flex; flex-direction: column;">
                <a href="./settings/tab.html" class="form">Tab Customizer Help</a>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(!localStorage.getItem("panicbutton")) localStorage.setItem("panicbutton", null); 
            if(!localStorage.getItem("paniclink")) localStorage.setItem("paniclink", null);
        });
        function setmedia(value) { localStorage.setItem("media", value); }
        function setpanicbutton(value) { localStorage.setItem("panicbutton", value); }
        function setpaniclink(value) { localStorage.setItem("paniclink", value); }
    </script>
</body>
</html>
